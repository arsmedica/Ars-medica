<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Ars Medica</title>
<style>
  :root {
    --ink: #2c332b;
    --sage: #6b7d67;
    --sage-light: #eef1ec;
    --cream: #faf8f3;
    --line: #d9dcd3;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    line-height: 1.6;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 96px 24px 64px;
  }

  .mark {
    font-family: Georgia, serif;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 40px;
  }

  h1 {
    font-size: 2rem;
    font-weight: 400;
    line-height: 1.25;
    margin: 0 0 28px;
    color: var(--ink);
  }

  p {
    font-size: 1.05rem;
    margin: 0 0 20px;
    color: #3e453c;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 40px 0;
  }

  .detail-box {
    background: var(--sage-light);
    border-radius: 2px;
    padding: 24px 28px;
    margin: 32px 0;
    font-size: 0.98rem;
  }

  .detail-box p:last-child { margin-bottom: 0; }

  a.back {
    display: inline-block;
    margin-top: 8px;
    color: var(--sage);
    text-decoration: none;
    border-bottom: 1px solid var(--sage);
    padding-bottom: 2px;
    font-size: 0.98rem;
  }

  a.back:hover { color: var(--ink); border-color: var(--ink); }

  .signature {
    margin-top: 48px;
    font-style: italic;
    color: #6a706a;
  }

  @media (max-width: 480px) {
    .wrap { padding: 64px 20px 48px; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">Ars Medica</div>

    <h1 id="heading">Thank you for reaching out.</h1>

    <div id="body-content">
      <p>Your message has been received. I read every enquiry personally, and will respond within a two days.</p>
    </div>

    <hr class="divider">

    <p class="signature">— Michelle Lewis-King</p>

    <a class="back" id="back-link" href="/index.html">← Back to Ars Medica</a>
  </div>

  <script>
    // Reads ?context=payment from the URL to switch which message displays.
    // Formspree redirects here with no parameter (default: contact-form message).
    // Stripe's payment success_url can point here with ?context=payment appended.
    const params = new URLSearchParams(window.location.search);
    const context = params.get('context');

    if (context === 'payment') {
      document.getElementById('heading').textContent = 'Thank you — your payment has been received.';
      document.getElementById('body-content').innerHTML = `
        <p>Your consultation is booked in, in the sense that matters most: I now have your payment confirmed on my end.</p>
        <div class="detail-box">
          <p>Within a few days, I'll email you directly to arrange a specific time that suits us both. If you have a preference already in mind, feel free to reply to your payment receipt with it.</p>
        </div>
        <p>Thank you for your patience while this is arranged personally rather than automatically — it means your consultation gets the same care as everything else in this practice.</p>
      `;
    } else if (context === 'signup') {
      document.getElementById('heading').textContent = "You're on the list.";
      document.getElementById('body-content').innerHTML = `
        <p>Thank you for signing up — you'll hear from Earth Body Cloud as soon as there's something new to share: workshops, walks, and retreats as the programme develops.</p>
      `;
      const backLink = document.getElementById('back-link');
      backLink.href = '/earth_body_cloud.html';
      backLink.textContent = '← Back to Earth Body Cloud';
    }
  </script>
</body>
</html>
